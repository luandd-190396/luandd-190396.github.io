<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards - Japanese Study App</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/flashcard.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="../index.html">
        <i class="bi bi-translate"></i> Japanese Study
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="../index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="hiragana.html">Hiragana</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="katakana.html">Katakana</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="vocab.html">Vocabulary</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="kanji.html">Kanji</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="flashcards.html">Flashcards</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="quiz.html">Quiz</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="admin.html">Admin</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Type Selector -->
  <div class="container mt-4">
    <div class="flashcard-type-selector">
      <div class="row align-items-center">
        <div class="col-md-6">
          <label for="typeSelector" class="form-label mb-0">Select Study Type:</label>
          <select id="typeSelector" class="form-select d-inline-block w-auto ms-2">
            <option value="hiragana">Hiragana</option>
            <option value="katakana">Katakana</option>
            <option value="vocab">Vocabulary</option>
            <option value="kanji">Kanji</option>
          </select>
        </div>
        <div class="col-md-6 text-end">
          <button id="btnShuffle" class="btn btn-primary">
            <i class="bi bi-shuffle"></i> Shuffle
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Progress -->
  <div class="container mt-4">
    <div class="flashcard-progress">
      <h4 id="cardProgress">0 / 0</h4>
      <div class="progress">
        <div id="progressBar" class="progress-bar" role="progressbar" style="width: 0%"></div>
      </div>
    </div>
  </div>

  <!-- Flashcard -->
  <div class="container">
    <div class="flashcard-container">
      <div class="flashcard">
        <div class="flashcard-inner">
          <div class="flashcard-front">
            <div class="flashcard-main">Loading...</div>
          </div>
          <div class="flashcard-back">
            <div class="flashcard-main">Loading...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="container">
    <div class="flashcard-controls">
      <button id="btnPrev" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Previous
      </button>
      <button id="btnFlip" class="btn btn-primary btn-lg">
        <i class="bi bi-arrow-repeat"></i> Flip Card
      </button>
      <button id="btnNext" class="btn btn-secondary">
        Next <i class="bi bi-arrow-right"></i>
      </button>
    </div>
    <div class="flashcard-hint">
      <p>Click the card or press Space/Enter to flip • Use arrow keys to navigate</p>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container text-center">
      <p>&copy; 2026 Japanese Study App</p>
    </div>
  </footer>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/data-service.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/flashcards.js"></script>
</body>
</html>
