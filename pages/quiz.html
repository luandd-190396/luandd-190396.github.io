<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz - Japanese Study App</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/quiz.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="../index.html">
        <i class="bi bi-translate"></i> Japanese Study
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="../index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="hiragana.html">Hiragana</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="katakana.html">Katakana</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="vocab.html">Vocabulary</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="kanji.html">Kanji</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="flashcards.html">Flashcards</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="quiz.html">Quiz</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="admin.html">Admin</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Page Header -->
  <div class="container mt-4">
    <div class="hero-section">
      <h1><i class="bi bi-question-circle"></i> Quiz</h1>
      <p class="lead">Test your Japanese knowledge</p>
    </div>
  </div>

  <!-- Quiz Selectors -->
  <div class="container mt-4">
    <div class="quiz-selectors">
      <div class="row g-3">
        <div class="col-md-6">
          <label for="typeSelector" class="form-label">Quiz Type:</label>
          <select id="typeSelector" class="form-select">
            <option value="hiragana">Hiragana</option>
            <option value="katakana">Katakana</option>
            <option value="vocab">Vocabulary</option>
            <option value="kanji">Kanji</option>
          </select>
        </div>
        <div class="col-md-6">
          <label for="modeSelector" class="form-label">Quiz Mode:</label>
          <select id="modeSelector" class="form-select">
            <!-- Options will be populated dynamically -->
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- Quiz Container -->
  <div class="container mt-4 quiz-container" id="quizContainer">
    <!-- Quiz Header -->
    <div class="quiz-header">
      <div class="d-flex justify-content-between align-items-center">
        <h5 id="questionNumber">Question 1 of 10</h5>
        <h5 id="currentScore">Score: 0/0</h5>
      </div>
      <div class="quiz-progress">
        <div id="quizProgressAnswered" class="progress-bar bg-secondary" role="progressbar" style="width: 0%"></div>
        <div id="quizProgressCorrect" class="progress-bar bg-success" role="progressbar" style="width: 0%"></div>
      </div>
    </div>

    <!-- Question Card -->
    <div class="question-card">
      <div id="questionText">
        <p class="text-center text-muted">Loading...</p>
      </div>
    </div>

    <!-- Options -->
    <div class="quiz-options" id="optionsContainer">
      <!-- Options will be dynamically loaded here -->
    </div>

    <!-- Restart Button -->
    <div class="text-center mt-4">
      <button id="btnRestart" class="btn btn-secondary">
        <i class="bi bi-arrow-clockwise"></i> Restart Quiz
      </button>
    </div>
  </div>

  <!-- Quiz Summary (Hidden by default) -->
  <div class="container mt-4 quiz-container" id="summaryContainer" style="display: none;">
    <div class="quiz-summary">
      <!-- Score Display -->
      <div class="score-display">
        <h2>Quiz Complete!</h2>
        <div class="display-1" id="finalScore">0 / 0</div>
        <div class="score-percentage" id="scorePercentage">0%</div>
      </div>

      <!-- Performance Message -->
      <div class="performance-message" id="performanceMessage">
        <!-- Will be populated dynamically -->
      </div>

      <!-- Progress Bar -->
      <div class="summary-progress-container">
        <div class="progress">
          <div id="summaryProgress" class="progress-bar" role="progressbar" style="width: 0%"></div>
        </div>
      </div>

      <!-- Detailed Results -->
      <div class="detailed-results">
        <h4>Detailed Results</h4>
        <div id="detailedResults">
          <!-- Will be populated dynamically -->
        </div>
      </div>

      <!-- Controls -->
      <div class="quiz-controls">
        <button id="btnRestartSummary" class="btn btn-primary">
          <i class="bi bi-arrow-clockwise"></i> Try Again
        </button>
        <button id="btnHome" class="btn btn-secondary">
          <i class="bi bi-house"></i> Back to Home
        </button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container text-center">
      <p>&copy; 2026 Japanese Study App</p>
    </div>
  </footer>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/data-service.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/quiz.js"></script>
</body>
</html>
