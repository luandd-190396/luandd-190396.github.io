<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Japanese Study App</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="../index.html">
        <i class="bi bi-translate"></i> Japanese Study
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="../index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="hiragana.html">Hiragana</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="katakana.html">Katakana</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="vocab.html">Vocabulary</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="kanji.html">Kanji</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="flashcards.html">Flashcards</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="quiz.html">Quiz</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="admin.html">Admin</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Admin Container -->
  <div class="container mt-4 mb-5">
    <div class="admin-container">
      <!-- Admin Header -->
      <div class="admin-header">
        <h2>Data Management</h2>
        <p>Add, edit, delete, import, export, and reset your learning data</p>
      </div>

      <!-- Tabs -->
      <ul class="nav nav-tabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="tab-hiragana-btn" type="button" role="tab">
            Hiragana
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="tab-katakana-btn" type="button" role="tab">
            Katakana
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="tab-vocab-btn" type="button" role="tab">
            Vocabulary
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="tab-kanji-btn" type="button" role="tab">
            Kanji
          </button>
        </li>
      </ul>

      <!-- Admin Content (shared by all tabs) -->
          <!-- Toolbar -->
          <div class="admin-toolbar">
            <div>
              <span class="item-count" id="itemCount">0 items</span>
            </div>
            <div class="btn-group">
              <button id="btnAdd" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Add New
              </button>
              <button id="btnExport" class="btn btn-success">
                <i class="bi bi-download"></i> Export
              </button>
              <button id="btnExportAll" class="btn btn-success">
                <i class="bi bi-download"></i> Export All
              </button>
              <button id="btnImport" class="btn btn-info">
                <i class="bi bi-upload"></i> Import
              </button>
              <button id="btnReset" class="btn btn-warning">
                <i class="bi bi-arrow-clockwise"></i> Reset
              </button>
              <button id="btnResetAll" class="btn btn-danger">
                <i class="bi bi-exclamation-triangle"></i> Reset All
              </button>
            </div>
          </div>

          <!-- Hidden File Input -->
          <input type="file" id="importFile" accept=".json" style="display: none;">

          <!-- Data Table -->
          <div class="admin-table-container">
            <table class="admin-table" id="dataTable">
              <thead>
                <tr>
                  <th>#</th>
                  <th colspan="5">Data will be displayed here</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td colspan="7" class="text-center py-4">
                    <div class="spinner"></div>
                    <p class="text-muted mt-3">Loading data...</p>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
    </div>
  </div>

  <!-- Edit/Add Modal -->
  <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Edit Item</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="itemForm">
            <!-- Form fields will be dynamically generated -->
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="btnSaveItem">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container text-center">
      <p>&copy; 2026 Japanese Study App</p>
    </div>
  </footer>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/data-service.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/admin.js"></script>
</body>
</html>
