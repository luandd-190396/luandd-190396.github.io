<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanji - Japanese Study App</title>
  
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#667eea">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="../assets/images/icon-192.svg">
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/cards.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="../index.html">
        <i class="bi bi-translate"></i> Japanese Study
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="../index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="hiragana.html">Hiragana</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="katakana.html">Katakana</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="vocab.html">Vocabulary</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="kanji.html">Kanji</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="flashcards.html">Flashcards</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="quiz.html">Quiz</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="admin.html">Admin</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>


  <!-- Search and Filters -->
  <div class="container mt-4">
    <div class="search-filters">
      <div class="row g-3 align-items-end">
        <div class="col-md-4">
          <label for="searchInput" class="form-label">Search</label>
          <input type="text" id="searchInput" class="form-control" placeholder="Search kanji, meaning, or reading...">
        </div>
        <div class="col-md-2">
          <label for="levelFilter" class="form-label">JLPT Level</label>
          <select id="levelFilter" class="form-select">
            <option value="all">All Levels</option>
          </select>
        </div>
        <div class="col-md-2">
          <label for="lessonFilter" class="form-label">Lesson</label>
          <select id="lessonFilter" class="form-select">
            <option value="all">All Lessons</option>
          </select>
        </div>
        <div class="col-md-4 text-end">
          <button id="btnFlashcard" class="btn btn-success">
            <i class="bi bi-card-list"></i> Flashcards
          </button>
          <button id="btnQuiz" class="btn btn-warning">
            <i class="bi bi-question-circle"></i> Quiz
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Results Count -->
  <div class="container mt-3">
    <div class="result-count">
      <span id="resultCount">Loading...</span>
    </div>
  </div>

  <!-- Cards Grid -->
  <div class="container mb-5">
    <div class="row g-3" id="cardsContainer">
      <!-- Cards will be dynamically loaded here -->
      <div class="col-12 text-center py-5">
        <div class="spinner"></div>
        <p class="text-muted mt-3">Loading kanji...</p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container text-center">
      <p>&copy; 2026 Japanese Study App</p>
    </div>
  </footer>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/data-service.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/kanji.js"></script>
  <!-- PWA Install -->
  <script src="../assets/js/pwa-install.js"></script>
</body>
</html>
